<body>
    <header class="header">
        <div class="logo">
                <h1>MARKET</h1>
            </div>
            <div class="all-action">

                <i class="fa-solid fa-magnifying-glass"></i>

            </div>
            <div class="actions">

        </div>
        </div>

           </div>
